name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  server:
    name: Server (test + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  views:
    name: Views (audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: views
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: views/package-lock.json
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
