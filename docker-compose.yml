# =============================================================================
# Desenvolvimento local — Docker Compose (base comum)
#
# Stack:
#   - api: Express + Prisma (porta 3333)
#   - web: Next.js (porta host 3000 → container 3000)
#
# Banco: NÃO há PostgreSQL aqui — use Supabase (DATABASE_URL em ./server/.env).
#
# Rede / SO:
#   - Este arquivo usa a rede bridge padrão: o Next chama a API em http://api:3333 (API_INTERNAL_URL).
#     Não é obrigatório publicar 3333 no host para o /agendar funcionar.
#     Assim, `docker compose up --build` funciona sem flags extras (Windows, macOS, Linux com Docker).
#   - Linux nativo com problema de saída para o Supabase: use o override + script:
#       ./scripts/docker-compose-stack.sh up --build
#     (equivale a `docker compose -f docker-compose.yml -f docker-compose.linux.yml ...`)
#
# Comando recomendado quando quiser detecção automática Linux vs desktop:
#   ./scripts/docker-compose-stack.sh up --build
#
# Windows (PowerShell):
#   pwsh ./scripts/docker-compose-stack.ps1 up --build
#
# Forçar manualmente:
#   COMPOSE_STACK=linux   ./scripts/docker-compose-stack.sh up
#   COMPOSE_STACK=desktop ./scripts/docker-compose-stack.sh up
#
# Migrações Prisma no banco remoto:
#   ./scripts/docker-compose-stack.sh exec api npx prisma migrate deploy
#
# Supabase / Prisma:
#   - Confirme que o projeto não está pausado no painel Supabase
#   - Use Connection Pooling (6543) na DATABASE_URL quando a saída direta 5432 falhar
#   - Senha na URL: codifique caracteres especiais (* → %2A , → %2C)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API — Node 22, Express, Prisma
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: server-dev
    container_name: lrm-api-dev
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    command: >
      sh -c "npm install &&
      npx prisma generate &&
      npm run dev"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — Next.js (dev:docker = Webpack no container)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: views-dev
    container_name: lrm-web-dev
    environment:
      NODE_ENV: development
      API_INTERNAL_URL: http://api:3333
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./views:/app
      - views_node_modules:/app/node_modules
      - views_next_cache:/app/.next
    command: >
      sh -c "npm install &&
      npm run dev:docker"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  server_node_modules:
  views_node_modules:
  views_next_cache:
